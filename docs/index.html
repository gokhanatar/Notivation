<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notivation - Legal</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      line-height: 1.7;
      color: #1a1a2e;
      background: #fafafa;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }
    .container { max-width: 480px; text-align: center; }
    h1 { font-size: 2rem; margin-bottom: 0.5rem; color: #2A8C82; }
    p { color: #666; margin-bottom: 2rem; }
    .links { display: flex; flex-direction: column; gap: 1rem; }
    a {
      display: block;
      padding: 1rem 2rem;
      background: #2A8C82;
      color: white;
      text-decoration: none;
      border-radius: 0.75rem;
      font-weight: 600;
      transition: background 0.2s;
    }
    a:hover { background: #1E6B63; }
    .badge { display: inline-block; background: #2A8C82; color: white; padding: 0.25rem 0.75rem; border-radius: 1rem; font-size: 0.75rem; margin-bottom: 1rem; }
  </style>
</head>
<body>
  <div class="container">
    <span class="badge">Notivation</span>
    <h1>Legal</h1>
    <p>Your thoughts, your device, your privacy.</p>
    <div class="links">
      <a href="privacy-policy.html">Privacy Policy</a>
      <a href="terms-of-service.html">Terms of Service</a>
    </div>
  </div>
</body>
</html>
