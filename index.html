<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Notivation</title>
    <meta name="description" content="A calm, offline-first note-taking app for decisions and actions. No clutter, no noise - just clarity." />
    <meta name="author" content="Notivation" />
    <meta name="theme-color" content="#2d6a6a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Notivation" />

    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon-180x180.png" />

    <meta property="og:title" content="Notivation" />
    <meta property="og:description" content="A calm, offline-first note-taking app for decisions and actions." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/logo.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="/logo.png" />

    <link rel="manifest" href="/manifest.json" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  </head>

  <body>
    <div id="root"></div>
    <script>
      window.onerror = function(msg, url, line, col, err) {
        document.body.innerHTML = '<pre style="color:red;padding:20px;font-size:14px;">ERROR: ' + msg + '\nFile: ' + url + '\nLine: ' + line + '\n' + (err ? err.stack : '') + '</pre>';
      };
      window.addEventListener('unhandledrejection', function(e) {
        document.body.innerHTML = '<pre style="color:red;padding:20px;font-size:14px;">PROMISE ERROR: ' + e.reason + '\n' + (e.reason && e.reason.stack ? e.reason.stack : '') + '</pre>';
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
